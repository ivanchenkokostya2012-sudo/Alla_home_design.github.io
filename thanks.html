<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Спасибо!</title>
    <style>
        body {
            font-family: 'Georgia', serif;
            background: #f8f5f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 500px;
            padding: 40px;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: normal;
            color: #1a1a1a;
        }
        p {
            font-size: 1.2rem;
            color: #555;
            font-family: 'Arial', sans-serif;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background: #1a1a1a;
            color: #fff;
            text-decoration: none;
            border-radius: 30px;
            font-family: 'Arial', sans-serif;
            font-size: 0.9rem;
        }
        .btn:hover {
            background: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Спасибо! 🙌</h1>
        <p>Ваше сообщение отправлено.<br>Я свяжусь с вами в ближайшее время.</p>
        <a href="index.html" class="btn">Вернуться на сайт</a>
    </div>
</body>
</html>
