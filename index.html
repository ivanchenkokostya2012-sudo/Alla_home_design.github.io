<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alla_Home_Design</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background: #f8f5f0;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 580px;
            width: 100%;
            padding: 50px 30px;
            text-align: center;
        }

        .main-title {
            font-size: 3.2rem;
            font-weight: normal;
            letter-spacing: 5px;
            margin-bottom: 8px;
            color: #1a1a1a;
            white-space: nowrap;
        }

        .sub-title {
            font-size: 1rem;
            letter-spacing: 3px;
            color: #555;
            border-top: 1px solid #ddd;
            border-bottom: 1px solid #ddd;
            padding: 14px 0;
            margin-bottom: 20px;
            font-weight: normal;
        }

        .gallery {
            margin: 25px auto 30px;
            display: flex;
            justify-content: center;
        }

        .gallery img {
            width: 50%;
            max-width: 250px;
            max-height: 200px;
            object-fit: cover;
            border-radius: 4px;
            display: block;
            background: #ddd;
        }

        .city {
            font-size: 0.95rem;
            color: #777;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-family: 'Arial', sans-serif;
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #ddd;
            background: #fff;
            font-family: 'Arial', sans-serif;
            font-size: 1rem;
            transition: border 0.3s;
            border-radius: 2px;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #999;
        }

        .form-group select {
            appearance: auto;
            cursor: pointer;
        }

        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 12px;
            text-align: left;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-top: 2px;
            flex-shrink: 0;
            accent-color: #1a1a1a;
            cursor: pointer;
        }

        .checkbox-group label {
            font-family: 'Arial', sans-serif;
            font-size: 0.82rem;
            color: #555;
            line-height: 1.5;
            cursor: pointer;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: #1a1a1a;
            color: #fff;
            border: none;
            font-family: 'Arial', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
            border-radius: 2px;
        }

        .submit-btn:hover {
            background: #333;
        }

        .footer {
            margin-top: 45px;
            padding-top: 25px;
            border-top: 1px solid #ddd;
            font-family: 'Arial', sans-serif;
            font-size: 0.7rem;
            color: #999;
            line-height: 1.8;
        }

        .footer a {
            color: #777;
            text-decoration: none;
            border-bottom: 1px dotted #ccc;
        }

        .footer a:hover {
            color: #333;
            border-bottom: 1px solid #333;
        }

        @media (max-width: 500px) {
            .container {
                padding: 30px 15px;
            }

            .main-title {
                font-size: 2.2rem;
                letter-spacing: 3px;
                white-space: normal;
            }

            .sub-title {
                font-size: 0.85rem;
                padding: 10px 0;
            }

            .gallery img {
                width: 70%;
                max-width: 200px;
                max-height: 150px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1 class="main-title">Alla_Home_Design</h1>
    <div class="sub-title">ДИЗАЙН ИНТЕРЬЕРА И РЕМОНТ ПОД КЛЮЧ</div>

    <!-- КАРТИНКА -->
    <div class="gallery">
        <img src="photo.jpg" alt="Интерьер">
    </div>

    <div class="city">САМАРА</div>

    <!-- ФОРМА С ОТПРАВКОЙ НА ПОЧТУ -->
    <form action="https://formsubmit.co/ivanchenkokostya2012@gmail.com" method="POST">
        <!-- Имя -->
        <div class="form-group">
            <label for="name">Ваше имя</label>
            <input type="text" id="name" name="Имя" placeholder="Например, Анна" required>
        </div>

        <!-- Объект -->
        <div class="form-group">
            <label for="object">Ваш объект</label>
            <input type="text" id="object" name="Объект" placeholder="Квартира/дом, новострой/вторичка, ЖК или район">
        </div>

        <!-- Площадь -->
        <div class="form-group">
            <label for="area">Площадь объекта (м²)</label>
            <input type="number" id="area" name="Площадь" placeholder="Например, 65">
        </div>

        <!-- Местоположение -->
        <div class="form-group">
            <label for="location">Местоположение объекта</label>
            <input type="text" id="location" name="Местоположение" placeholder="Населенный пункт, улица">
        </div>

        <!-- Когда начать ремонт -->
        <div class="form-group">
            <label for="timing">Когда хотели бы начать ремонт?</label>
            <select id="timing" name="Срок_начала">
                <option value="">Выберите вариант...</option>
                <option value="в ближайший месяц">В ближайший месяц</option>
                <option value="через 2-3 месяца">Через 2-3 месяца</option>
                <option value="через 3-6 месяцев">Через 3-6 месяцев</option>
                <option value="через полгода и позже">Через полгода и позже</option>
                <option value="ещё не решили">Ещё не решили</option>
            </select>
        </div>

        <!-- Телефон -->
        <div class="form-group">
            <label for="phone_input">Номер телефона</label>
            <input type="tel" id="phone_input" name="Телефон" placeholder="+7 900 000-00-00" required>
        </div>

        <!-- Скрытые поля для FormSubmit -->
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_next" value="thanks.html">

        <!-- Чекбоксы -->
        <div class="checkbox-group">
            <input type="checkbox" id="privacy" name="privacy" value="Согласен" required>
            <label for="privacy">«Я принимаю условия Политики конфиденциальности»</label>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="consent" name="consent" value="Согласен" required>
            <label for="consent">«Я даю согласие на обработку персональных данных»</label>
        </div>

        <button type="submit" class="submit-btn">ОТПРАВИТЬ</button>
    </form>

    <div class="footer">
        This site was made on Tilda — a website builder that helps to create a website without any code<br>
        <a href="#">Create a website</a>
    </div>
</div>

</body>
</html>
